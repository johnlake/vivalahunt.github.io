<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A simple landing page" />
    <title>Landing Page</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="content-card">
        <div class="logo-wrap">
          <img src="img/LogoRaw.png" alt="Logo" class="logo" />
        </div>

        <div class="content-stack">
          <img src="img/logo.png" alt="Logo" class="image-placeholder" />

          <div class="text-block">
            <p class="login-line">
              login:
              <button id="playButton" type="button" class="play-button">click here to play</button>
            </p>

            <p class="warning-line">abandon all hope ye who enter here</p>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>© 2026 John Lake</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
